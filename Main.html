<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HAYWAY</title>
  <style>
    :root {
      --bg: #f6f1ea;
      --paper: #fffaf5;
      --ink: #2e241f;
      --point: #a66c5a;
      --point-soft: #e8cfc2;
      --line: #d8c7bc;
      --shadow: 0 14px 30px rgba(46, 36, 31, 0.12);
      --radius-xl: 28px;
      --radius-lg: 20px;
      --radius-md: 14px;
      --max: 1180px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(255,255,255,0.9), transparent 30%),
        linear-gradient(180deg, #f8f2ec 0%, #f3ebe3 100%);
      min-height: 100vh;
    }

    img {
      display: block;
      max-width: 100%;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    .wrap {
      width: min(calc(100% - 32px), var(--max));
      margin: 0 auto;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 50;
      backdrop-filter: blur(10px);
      background: rgba(246, 241, 234, 0.72);
      border-bottom: 1px solid rgba(166, 108, 90, 0.12);
    }

    .topbar-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      min-height: 68px;
    }

    .logo {
      font-size: 1.25rem;
      font-weight: 800;
      letter-spacing: 0.16em;
    }

    .nav {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .nav a {
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(255, 250, 245, 0.8);
      border: 1px solid rgba(166, 108, 90, 0.16);
      font-size: 0.95rem;
    }

    .hero {
      padding: 32px 0 18px;
    }

    .hero-card,
    .section-card {
      background: rgba(255, 250, 245, 0.86);
      border: 1px solid rgba(166, 108, 90, 0.14);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
      padding: 24px;
    }

    .hero-top {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      padding: 7px 12px;
      border-radius: 999px;
      background: var(--point-soft);
      font-size: 0.82rem;
      font-weight: 700;
      margin-bottom: 14px;
    }

    h1 {
      margin: 0;
      font-size: clamp(2.2rem, 4vw, 4rem);
      line-height: 0.95;
      letter-spacing: 0.08em;
    }

    .hero-copy,
    .section-copy {
      margin: 12px 0 0;
      color: rgba(46, 36, 31, 0.78);
      line-height: 1.6;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 16px;
      margin-top: 18px;
    }

    .session-card {
      grid-column: span 4;
      position: relative;
      min-height: 340px;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: var(--shadow);
      border: 1px solid rgba(166, 108, 90, 0.12);
      background: #fff;
      transform: rotate(var(--rotate, 0deg));
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      cursor: pointer;
    }

    .session-card:hover {
      transform: translateY(-4px) rotate(var(--rotate, 0deg));
      box-shadow: 0 18px 36px rgba(46, 36, 31, 0.18);
    }

    .session-card::before {
      content: "";
      position: absolute;
      top: 14px;
      left: 50%;
      transform: translateX(-50%) rotate(-3deg);
      width: 96px;
      height: 28px;
      background: rgba(255, 239, 179, 0.58);
      border: 1px solid rgba(160, 130, 40, 0.12);
      z-index: 2;
      backdrop-filter: blur(2px);
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.08);
    }

    .card-image {
      height: 100%;
      width: 100%;
      object-fit: cover;
    }

    .card-info {
      position: absolute;
      inset: auto 0 0 0;
      padding: 18px;
      background: linear-gradient(180deg, transparent, rgba(24, 18, 15, 0.78));
      color: #fffaf5;
      z-index: 1;
    }

    .card-tag {
      display: inline-block;
      margin-bottom: 8px;
      padding: 6px 10px;
      font-size: 0.78rem;
      border-radius: 999px;
      background: rgba(255,255,255,0.18);
      backdrop-filter: blur(4px);
    }

    .card-title {
      margin: 0;
      font-size: 1.15rem;
      font-weight: 800;
    }

    .card-desc {
      margin: 8px 0 0;
      font-size: 0.92rem;
      line-height: 1.45;
      color: rgba(255, 250, 245, 0.86);
    }

    .character-row {
      display: flex;
      gap: 10px;
      margin-top: 12px;
    }

    .character-thumb {
      width: 52px;
      height: 52px;
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(255,255,255,0.22);
      backdrop-filter: blur(3px);
      box-shadow: 0 8px 16px rgba(46, 36, 31, 0.08);
    }

    .character-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .section {
      padding: 16px 0 28px;
    }

    .section-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }

    .section-title {
      margin: 0;
      font-size: 1.35rem;
    }

    .calendar-layout {
      display: grid;
      grid-template-columns: minmax(0, 1.25fr) minmax(280px, 0.75fr);
      gap: 18px;
      align-items: start;
    }

    .calendar-box,
    .planner-box {
      background: rgba(255,255,255,0.72);
      border: 1px solid rgba(166, 108, 90, 0.14);
      border-radius: 22px;
      padding: 18px;
    }

    .calendar-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 14px;
    }

    .month-title {
      margin: 0;
      font-size: 1.15rem;
      font-weight: 800;
    }

    .icon-btn {
      appearance: none;
      border: 0;
      background: rgba(166, 108, 90, 0.12);
      color: var(--ink);
      width: 38px;
      height: 38px;
      border-radius: 999px;
      cursor: pointer;
      font-weight: 800;
    }

    .weekdays,
    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 8px;
    }

    .weekdays {
      margin-bottom: 8px;
      color: rgba(46, 36, 31, 0.62);
      font-size: 0.88rem;
      text-align: center;
    }

    .weekday {
      padding: 6px 0;
    }

    .day-cell {
      min-height: 92px;
      padding: 10px;
      border-radius: 18px;
      background: rgba(255,255,255,0.82);
      border: 1px solid rgba(166, 108, 90, 0.12);
      cursor: pointer;
      transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
      text-align: left;
    }

    .day-cell:hover {
      transform: translateY(-2px);
      border-color: rgba(166, 108, 90, 0.38);
      box-shadow: 0 10px 18px rgba(46, 36, 31, 0.08);
    }

    .day-cell.muted {
      opacity: 0.42;
    }

    .day-cell.today {
      border-color: rgba(166, 108, 90, 0.7);
    }

    .day-cell.selected {
      background: rgba(232, 207, 194, 0.36);
      border-color: rgba(166, 108, 90, 0.56);
    }

    .day-number {
      font-size: 0.95rem;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .event-dots {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }

    .event-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--point);
    }

    .event-dot.anniversary {
      background: #d07a8c;
    }

    .planner-box h3 {
      margin: 0 0 10px;
      font-size: 1rem;
    }

    .selected-date {
      display: inline-flex;
      padding: 8px 12px;
      border-radius: 999px;
      background: var(--point-soft);
      font-size: 0.92rem;
      font-weight: 700;
      margin-bottom: 14px;
    }

    .form-grid {
      display: grid;
      gap: 10px;
    }

    .field,
    .select,
    .textarea {
      width: 100%;
      border: 1px solid rgba(166, 108, 90, 0.18);
      border-radius: 14px;
      background: #fff;
      padding: 12px 14px;
      color: var(--ink);
    }

    .textarea {
      resize: vertical;
      min-height: 92px;
    }

    .btn-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    .btn {
      appearance: none;
      border: 0;
      border-radius: 999px;
      background: var(--point);
      color: #fff;
      padding: 12px 16px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 10px 20px rgba(166, 108, 90, 0.25);
    }

    .btn.secondary {
      background: #fff;
      color: var(--ink);
      border: 1px solid rgba(166, 108, 90, 0.18);
      box-shadow: none;
    }

    .event-list {
      display: grid;
      gap: 10px;
      margin-top: 16px;
    }

    .event-item {
      padding: 12px 14px;
      border-radius: 16px;
      background: rgba(255,255,255,0.86);
      border: 1px solid rgba(166, 108, 90, 0.12);
    }

    .event-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 6px;
    }

    .event-type {
      display: inline-flex;
      padding: 5px 10px;
      border-radius: 999px;
      background: rgba(166, 108, 90, 0.12);
      font-size: 0.8rem;
      font-weight: 700;
    }

    .event-type.anniversary {
      background: rgba(208, 122, 140, 0.18);
    }

    .empty {
      color: rgba(46, 36, 31, 0.58);
      line-height: 1.6;
      padding: 6px 2px;
    }

    footer {
      padding: 10px 0 34px;
      color: rgba(46, 36, 31, 0.64);
      text-align: center;
      font-size: 0.92rem;
    }

    @media (max-width: 960px) {
      .gallery {
        grid-template-columns: repeat(2, 1fr);
      }

      .session-card {
        grid-column: span 1;
      }

      .calendar-layout {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 640px) {
      .wrap {
        width: min(calc(100% - 20px), var(--max));
      }

      .hero-card,
      .section-card {
        padding: 18px;
      }

      .gallery {
        grid-template-columns: 1fr;
      }

      .weekdays,
      .calendar-grid {
        gap: 6px;
      }

      .day-cell {
        min-height: 76px;
        padding: 8px;
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="wrap topbar-inner">
      <a href="#top" class="logo">HAYWAY</a>
      <nav class="nav">
        <a href="#sessions">SESSION</a>
        <a href="#calendar">CALENDAR</a>
      </nav>
    </div>
  </header>

  <main id="top">
    <section class="hero">
      <div class="wrap">
        <div class="hero-card">
          <div class="hero-top">
            <div>
              <div class="eyebrow">ROLL20 LOG BACKUP</div>
              <h1>HAYWAY</h1>
              <p class="hero-copy">
                세션 폴더별 대표 이미지를 첫 화면 카드로 보여주는 백업용 블로그.
                카드를 누르면 각 세션 폴더 안의 Main.html 채팅 로그로 이동합니다.
              </p>
            </div>
          </div>

          <div class="gallery" id="sessions"></div>
        </div>
      </div>
    </section>

    <section class="section" id="calendar">
      <div class="wrap">
        <div class="section-card">
          <div class="section-head">
            <div>
              <h2 class="section-title">CALENDAR</h2>
              <p class="section-copy">
                날짜를 누른 뒤 기념일이나 일정을 추가할 수 있습니다.
                입력한 내용은 브라우저에 저장됩니다.
              </p>
            </div>
          </div>

          <div class="calendar-layout">
            <div class="calendar-box">
              <div class="calendar-top">
                <button class="icon-btn" id="prevMonth" type="button">‹</button>
                <h3 class="month-title" id="monthTitle"></h3>
                <button class="icon-btn" id="nextMonth" type="button">›</button>
              </div>

              <div class="weekdays">
                <div class="weekday">일</div>
                <div class="weekday">월</div>
                <div class="weekday">화</div>
                <div class="weekday">수</div>
                <div class="weekday">목</div>
                <div class="weekday">금</div>
                <div class="weekday">토</div>
              </div>

              <div class="calendar-grid" id="calendarGrid"></div>
            </div>

            <aside class="planner-box">
              <h3>기념일 · 일정 추가</h3>
              <div class="selected-date" id="selectedDateLabel"></div>

              <div class="form-grid">
                <input class="field" id="eventTitle" type="text" placeholder="제목" />
                <select class="select" id="eventType">
                  <option value="schedule">일정</option>
                  <option value="anniversary">기념일</option>
                </select>
                <textarea class="textarea" id="eventMemo" placeholder="메모"></textarea>
              </div>

              <div class="btn-row">
                <button class="btn" id="addEventBtn" type="button">추가</button>
                <button class="btn secondary" id="clearSelectedBtn" type="button">해당 날짜 전체 삭제</button>
              </div>

              <div class="event-list" id="eventList"></div>
            </aside>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer>
    HAYWAY · Roll20 session backup archive
  </footer>

  <script>
    const sessions = [
      {
        folder: 'Mermalondo',
        tag: 'SESSION',
        title: 'Mermalondo',
        desc: '세션 대표 카드. 클릭하면 해당 세션 폴더의 Main.html로 이동합니다.',
        cover: './Mermalondo/intro.jpg',
        characters: [
          './Mermalondo/NI.jpg',
          './Mermalondo/FI.jpg'
        ],
        rotate: '-1.5deg'
      }
    ];

    const gallery = document.getElementById('sessions');

    function renderGallery() {
      gallery.innerHTML = sessions.map((session, index) => `
        <article class="session-card" data-index="${index}" style="--rotate:${session.rotate}">
          <img class="card-image" src="${session.cover}" alt="${session.title}" />
          <div class="card-info">
            <span class="card-tag">${session.tag}</span>
            <h3 class="card-title">${session.title}</h3>
            <p class="card-desc">${session.desc}</p>
            <div class="character-row">
              ${session.characters.map((src) => `
                <div class="character-thumb">
                  <img src="${src}" alt="캐릭터 이미지" />
                </div>
              `).join('')}
            </div>
          </div>
        </article>
      `).join('');

      document.querySelectorAll('.session-card').forEach((cardEl) => {
        cardEl.addEventListener('click', () => {
          const session = sessions[Number(cardEl.dataset.index)];
          window.location.href = `./${session.folder}/Main.html`;
        });
      });
    }

    const STORAGE_KEY = 'hayway-calendar-events-v1';
    const monthTitle = document.getElementById('monthTitle');
    const calendarGrid = document.getElementById('calendarGrid');
    const selectedDateLabel = document.getElementById('selectedDateLabel');
    const eventList = document.getElementById('eventList');
    const eventTitle = document.getElementById('eventTitle');
    const eventType = document.getElementById('eventType');
    const eventMemo = document.getElementById('eventMemo');
    const prevMonth = document.getElementById('prevMonth');
    const nextMonth = document.getElementById('nextMonth');
    const addEventBtn = document.getElementById('addEventBtn');
    const clearSelectedBtn = document.getElementById('clearSelectedBtn');

    const today = new Date();
    let currentYear = today.getFullYear();
    let currentMonth = today.getMonth();
    let selectedDateKey = formatDateKey(today);
    let calendarEvents = loadEvents();

    function formatDateKey(date) {
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, '0');
      const d = String(date.getDate()).padStart(2, '0');
      return `${y}-${m}-${d}`;
    }

    function parseDateKey(key) {
      const [y, m, d] = key.split('-').map(Number);
      return new Date(y, m - 1, d);
    }

    function formatLabel(date) {
      return `${date.getFullYear()}년 ${date.getMonth() + 1}월 ${date.getDate()}일`;
    }

    function loadEvents() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
      } catch {
        return {};
      }
    }

    function saveEvents() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(calendarEvents));
    }

    function renderCalendar() {
      monthTitle.textContent = `${currentYear}년 ${currentMonth + 1}월`;
      selectedDateLabel.textContent = formatLabel(parseDateKey(selectedDateKey));

      const firstDay = new Date(currentYear, currentMonth, 1);
      const lastDay = new Date(currentYear, currentMonth + 1, 0);
      const startWeekday = firstDay.getDay();
      const daysInMonth = lastDay.getDate();
      const prevLastDay = new Date(currentYear, currentMonth, 0).getDate();

      const cells = [];

      for (let i = startWeekday - 1; i >= 0; i -= 1) {
        const date = new Date(currentYear, currentMonth - 1, prevLastDay - i);
        cells.push(createCellData(date, true));
      }

      for (let day = 1; day <= daysInMonth; day += 1) {
        const date = new Date(currentYear, currentMonth, day);
        cells.push(createCellData(date, false));
      }

      const remain = 42 - cells.length;
      for (let day = 1; day <= remain; day += 1) {
        const date = new Date(currentYear, currentMonth + 1, day);
        cells.push(createCellData(date, true));
      }

      calendarGrid.innerHTML = cells.map((cell) => {
        const dots = cell.events.slice(0, 4).map((item) => `
          <span class="event-dot ${item.type === 'anniversary' ? 'anniversary' : ''}"></span>
        `).join('');

        return `
          <button class="day-cell ${cell.isMuted ? 'muted' : ''} ${cell.isToday ? 'today' : ''} ${cell.isSelected ? 'selected' : ''}" type="button" data-date="${cell.key}">
            <div class="day-number">${cell.day}</div>
            <div class="event-dots">${dots}</div>
          </button>
        `;
      }).join('');

      calendarGrid.querySelectorAll('.day-cell').forEach((button) => {
        button.addEventListener('click', () => {
          selectedDateKey = button.dataset.date;
          const date = parseDateKey(selectedDateKey);
          currentYear = date.getFullYear();
          currentMonth = date.getMonth();
          renderCalendar();
          renderEvents();
        });
      });
    }

    function createCellData(date, isMuted) {
      const key = formatDateKey(date);
      const isToday = key === formatDateKey(today);
      const isSelected = key === selectedDateKey;
      return {
        key,
        day: date.getDate(),
        isMuted,
        isToday,
        isSelected,
        events: calendarEvents[key] || []
      };
    }

    function renderEvents() {
      selectedDateLabel.textContent = formatLabel(parseDateKey(selectedDateKey));
      const items = calendarEvents[selectedDateKey] || [];

      if (!items.length) {
        eventList.innerHTML = '<div class="empty">이 날짜에는 등록된 기념일이나 일정이 없습니다.</div>';
        return;
      }

      eventList.innerHTML = items.map((item, index) => `
        <div class="event-item">
          <div class="event-head">
            <strong>${item.title}</strong>
            <button class="icon-btn" type="button" data-remove-index="${index}">×</button>
          </div>
          <div class="event-type ${item.type === 'anniversary' ? 'anniversary' : ''}">${item.type === 'anniversary' ? '기념일' : '일정'}</div>
          ${item.memo ? `<p style="margin: 8px 0 0; line-height: 1.55; color: rgba(46, 36, 31, 0.74);">${item.memo}</p>` : ''}
        </div>
      `).join('');

      eventList.querySelectorAll('[data-remove-index]').forEach((button) => {
        button.addEventListener('click', () => {
          const index = Number(button.dataset.removeIndex);
          calendarEvents[selectedDateKey].splice(index, 1);
          if (!calendarEvents[selectedDateKey].length) delete calendarEvents[selectedDateKey];
          saveEvents();
          renderCalendar();
          renderEvents();
        });
      });
    }

    addEventBtn.addEventListener('click', () => {
      const title = eventTitle.value.trim();
      const memo = eventMemo.value.trim();
      const type = eventType.value;

      if (!title) {
        alert('제목을 입력하세요.');
        return;
      }

      if (!calendarEvents[selectedDateKey]) calendarEvents[selectedDateKey] = [];
      calendarEvents[selectedDateKey].push({ title, memo, type });

      saveEvents();
      eventTitle.value = '';
      eventMemo.value = '';
      eventType.value = 'schedule';
      renderCalendar();
      renderEvents();
    });

    clearSelectedBtn.addEventListener('click', () => {
      if (!calendarEvents[selectedDateKey]) return;
      delete calendarEvents[selectedDateKey];
      saveEvents();
      renderCalendar();
      renderEvents();
    });

    prevMonth.addEventListener('click', () => {
      currentMonth -= 1;
      if (currentMonth < 0) {
        currentMonth = 11;
        currentYear -= 1;
      }
      renderCalendar();
    });

    nextMonth.addEventListener('click', () => {
      currentMonth += 1;
      if (currentMonth > 11) {
        currentMonth = 0;
        currentYear += 1;
      }
      renderCalendar();
    });

    renderGallery();
    renderCalendar();
    renderEvents();
  </script>
</body>
</html>
