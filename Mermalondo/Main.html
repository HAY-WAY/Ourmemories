<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mermalondo</title>
  <style>
    :root {
      --bg: #f5eee7;
      --paper: #fffaf6;
      --ink: #2f2622;
      --point: #a66c5a;
      --line: #dccdc1;
      --shadow: 0 14px 30px rgba(47, 38, 34, 0.12);
      --max: 920px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(255,255,255,0.9), transparent 30%),
        linear-gradient(180deg, #f8f2ec 0%, #f2e8df 100%);
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    img {
      display: block;
      max-width: 100%;
    }

    .wrap {
      width: min(calc(100% - 24px), var(--max));
      margin: 0 auto;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      background: rgba(245, 238, 231, 0.78);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(166, 108, 90, 0.12);
    }

    .topbar-inner {
      min-height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-radius: 999px;
      background: #fff;
      border: 1px solid rgba(166, 108, 90, 0.18);
      box-shadow: 0 8px 16px rgba(47, 38, 34, 0.08);
      font-weight: 700;
    }

    .page-title {
      font-size: 1rem;
      font-weight: 800;
      letter-spacing: 0.08em;
    }

    .hero {
      padding: 24px 0 16px;
    }

    .hero-card,
    .content-card,
    .sticker-card {
      background: rgba(255, 250, 246, 0.88);
      border: 1px solid rgba(166, 108, 90, 0.14);
      border-radius: 28px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .hero-image {
      width: 100%;
      aspect-ratio: 16 / 8;
      object-fit: cover;
    }

    .hero-body {
      padding: 22px;
    }

    .eyebrow {
      display: inline-flex;
      padding: 7px 12px;
      border-radius: 999px;
      background: rgba(166, 108, 90, 0.14);
      font-size: 0.82rem;
      font-weight: 700;
      margin-bottom: 12px;
    }

    h1,
    h2,
    h3,
    p {
      margin-top: 0;
    }

    h1 {
      margin-bottom: 10px;
      font-size: clamp(2rem, 4vw, 3rem);
    }

    .muted {
      color: rgba(47, 38, 34, 0.76);
      line-height: 1.7;
    }

    .character-row {
      display: flex;
      gap: 12px;
      margin-top: 18px;
      flex-wrap: wrap;
    }

    .character-card {
      width: 92px;
      text-align: center;
    }

    .character-card img {
      width: 92px;
      height: 92px;
      object-fit: cover;
      border-radius: 18px;
      border: 1px solid rgba(166, 108, 90, 0.14);
      box-shadow: 0 8px 16px rgba(47, 38, 34, 0.08);
      margin-bottom: 8px;
    }

    .section {
      padding: 16px 0;
    }

    .content-card {
      padding: 24px;
    }

    .log-content {
      background: rgba(255,255,255,0.72);
      border: 1px solid rgba(166, 108, 90, 0.12);
      border-radius: 22px;
      padding: 20px;
      line-height: 1.8;
      white-space: pre-wrap;
    }

    .sticker-card {
      padding: 24px;
    }

    .tool-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .btn {
      appearance: none;
      border: 0;
      border-radius: 999px;
      background: var(--point);
      color: #fff;
      padding: 11px 16px;
      font-weight: 700;
      cursor: pointer;
    }

    .btn.secondary {
      background: #fff;
      color: var(--ink);
      border: 1px solid rgba(166, 108, 90, 0.18);
    }

    .sticker-board {
      position: relative;
      min-height: 560px;
      border-radius: 24px;
      background:
        linear-gradient(0deg, rgba(255,255,255,0.18), rgba(255,255,255,0.18)),
        url('./intro.jpg') center/cover;
      border: 2px dashed rgba(166, 108, 90, 0.2);
      overflow: hidden;
    }

    .sticker-note {
      position: absolute;
      top: 16px;
      left: 16px;
      padding: 12px 14px;
      border-radius: 16px;
      background: rgba(255, 250, 246, 0.94);
      border: 1px solid rgba(166, 108, 90, 0.14);
      font-size: 0.92rem;
      line-height: 1.6;
      z-index: 2;
    }

    .sticker-tray {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(88px, 1fr));
      gap: 12px;
      margin-top: 16px;
    }

    .sticker-pick {
      aspect-ratio: 1 / 1;
      border: 1px solid rgba(166, 108, 90, 0.14);
      border-radius: 18px;
      background: rgba(255,255,255,0.82);
      display: grid;
      place-items: center;
      padding: 10px;
      cursor: pointer;
    }

    .sticker-pick img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .sticker-item {
      position: absolute;
      width: 120px;
      cursor: grab;
      user-select: none;
      touch-action: none;
      filter: drop-shadow(0 12px 18px rgba(0, 0, 0, 0.16));
    }

    .sticker-item.dragging {
      cursor: grabbing;
      z-index: 10;
    }

    .sticker-item img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      pointer-events: none;
    }

    .sticker-controls {
      position: absolute;
      bottom: -10px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 6px;
      opacity: 0;
      pointer-events: none;
    }

    .sticker-item.selected .sticker-controls {
      opacity: 1;
      pointer-events: auto;
    }

    .mini-btn {
      appearance: none;
      border: 0;
      width: 30px;
      height: 30px;
      border-radius: 999px;
      background: rgba(255,250,246,0.96);
      box-shadow: 0 8px 16px rgba(47, 38, 34, 0.12);
      font-weight: 800;
      cursor: pointer;
    }

    footer {
      padding: 18px 0 34px;
      text-align: center;
      color: rgba(47, 38, 34, 0.6);
      font-size: 0.92rem;
    }

    @media (max-width: 640px) {
      .wrap {
        width: min(calc(100% - 16px), var(--max));
      }

      .hero-body,
      .content-card,
      .sticker-card {
        padding: 18px;
      }

      .sticker-board {
        min-height: 460px;
      }

      .sticker-item {
        width: 96px;
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="wrap topbar-inner">
      <a class="back-btn" href="../Main.html">← 뒤로가기</a>
      <div class="page-title">MERMAID LONDO</div>
    </div>
  </header>

  <main>
    <section class="hero">
      <div class="wrap">
        <div class="hero-card">
          <img class="hero-image" src="./intro.png" alt="대표 이미지" />
          <div class="hero-body">
            <div class="eyebrow">SESSION LOG</div>
            <h1>MERMAID LONDO</h1>
            <p class="muted">
             내 사랑이 한 줌 공기방울이라면 아주 느리게 헤엄쳐 너를 숨쉬게 할 텐데.
      
            </p>

            <div class="character-row">
              <div class="character-card">
                <img src="./NI.jpg" alt="니콜 헤인즈" />
                <div>니콜</div>
              </div>
              <div class="character-card">
                <img src="./FI.jpg" alt="파비안 캘러웨이" />
                <div>파비안</div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <section class="section">
      <div class="wrap">
        <div class="content-card">
          <div class="eyebrow">CHAT LOG</div>
          <h2>세션 로그</h2>
          <div class="log-content">
    </section>

  </main>

  <footer>Mermalondo session archive</footer>
</body>
</html>
