<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MERMAID LONDO</title>
  <style>
    :root {
      --bg: #f5eee7;
      --paper: #fffaf6;
      --ink: #2f2622;
      --point: #a66c5a;
      --line: #dccdc1;
      --shadow: 0 14px 30px rgba(47, 38, 34, 0.12);
      --max: 980px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(255,255,255,0.9), transparent 30%),
        linear-gradient(180deg, #f8f2ec 0%, #f2e8df 100%);
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    img {
      display: block;
      max-width: 100%;
    }

    .wrap {
      width: min(calc(100% - 24px), var(--max));
      margin: 0 auto;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      background: rgba(245, 238, 231, 0.78);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(166, 108, 90, 0.12);
    }

    .topbar-inner {
      min-height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-radius: 999px;
      background: #fff;
      border: 1px solid rgba(166, 108, 90, 0.18);
      box-shadow: 0 8px 16px rgba(47, 38, 34, 0.08);
      font-weight: 700;
    }

    .page-title {
      font-size: 0.95rem;
      font-weight: 800;
      letter-spacing: 0.08em;
    }

    .hero {
      padding: 28px 0 18px;
    }

    .hero-card,
    .content-card {
      background: rgba(255, 250, 246, 0.9);
      border: 1px solid rgba(166, 108, 90, 0.14);
      border-radius: 32px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .hero-image {
      width: 100%;
      aspect-ratio: 16 / 8;
      object-fit: cover;
    }

    .hero-body {
      padding: 34px 28px 30px;
      text-align: center;
    }

    .quote {
      margin: 0 auto;
      max-width: 720px;
      font-size: clamp(0.6rem, 1vw, 1.8rem);
      line-height: 1.7;
      color: rgba(47, 38, 34, 0.86);
      letter-spacing: -0.01em;
    }

    .character-row {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      gap: 16px;
      margin-top: 28px;
      flex-wrap: wrap;
    }

    .character-card {
      width: 110px;
      text-align: center;
    }

    .character-card img {
      width: 110px;
      height: 110px;
      object-fit: cover;
      border-radius: 20px;
      border: 1px solid rgba(166, 108, 90, 0.14);
      box-shadow: 0 8px 16px rgba(47, 38, 34, 0.08);
      margin-bottom: 10px;
    }

    .character-name {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-size: 1.05rem;
      line-height: 1.2;
    }

    .section {
      padding: 14px 0 32px;
    }

    .content-card {
      padding: 26px;
    }

    .section-head {
      margin-bottom: 16px;
      text-align: center;
    }

    .section-head h2 {
      margin: 0;
      font-size: 1.4rem;
    }

.log-content {
  background: rgba(255,255,255,0.76);
  border: 1px solid rgba(166, 108, 90, 0.12);
  border-radius: 24px;
  padding: 0;
  overflow: hidden;
}

.log-frame-wrap {
  min-height: 700px;
}

.roll20-frame {
  width: 100%;
  min-height: 1200px;
  border: 0;
  display: block;
  background: transparent;
}

    footer {
      padding: 18px 0 34px;
      text-align: center;
      color: rgba(47, 38, 34, 0.6);
      font-size: 0.92rem;
    }

    @media (max-width: 640px) {
      .wrap {
        width: min(calc(100% - 16px), var(--max));
      }

      .hero-body,
      .content-card {
        padding: 18px;
      }

      .character-card {
        width: 92px;
      }

      .character-card img {
        width: 92px;
        height: 92px;
      }

      .character-name {
        font-size: 0.95rem;
      }

      .log-content {
        padding: 16px;
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="wrap topbar-inner">
      <a class="back-btn" href="../Main.html">← 뒤로가기</a>
      <div class="page-title">MERMAID LONDO</div>
    </div>
  </header>

  <main>
    <section class="hero">
      <div class="wrap">
        <div class="hero-card">
          <img class="hero-image" src="./intro.png" alt="대표 이미지" />
          <div class="hero-body">
            <p class="quote">
              내 사랑이 한 줌 공기방울이라면 아주 느리게 헤엄쳐 너를 숨쉬게 할 텐데.
            </p>

            <div class="character-row">
              <div class="character-card">
                <img src="./NI.jpg" alt="니콜 헤인즈" />
                <div class="character-name">니콜</div>
              </div>
              <div class="character-card">
                <img src="./FI.jpg" alt="파비안 캘러웨이" />
                <div class="character-name">파비안</div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>

   <section class="section">
  <div class="wrap">
    <div class="content-card">
      <div class="section-head">
        <h2>log</h2>
      </div>

      <div class="log-content log-frame-wrap">
  <iframe
    id="roll20Frame"
    class="roll20-frame"
    src="./roll20-raw.html"
    title="log"
    loading="lazy">
  </iframe>
</div>
    </div>
  </div>
</section>
  </main>

  <footer>Mermalondo session archive</footer>

  
</body>
</html>
